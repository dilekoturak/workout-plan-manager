server {
    listen 80;
    server_name localhost;

    # Symfony public directory is the document root
    root /app/public;
    index index.php;

    # Route all requests through Symfony's front controller (index.php)
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Pass PHP files to PHP-FPM running in the "app" container
    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.*)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        internal;
    }

    # Deny access to all other .php files (security best practice)
    location ~ \.php$ {
        return 404;
    }

    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
