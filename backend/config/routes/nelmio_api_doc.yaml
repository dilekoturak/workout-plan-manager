# OpenAPI JSON spec — used by external tools (Postman, etc.)
app.swagger:
    path: /api/doc.json
    methods: GET
    defaults: { _controller: nelmio_api_doc.controller.swagger }

# Swagger UI — browse the API in the browser at http://localhost:8080/api/doc
app.swagger_ui:
    path: /api/doc
    methods: GET
    defaults: { _controller: nelmio_api_doc.controller.swagger_ui }
