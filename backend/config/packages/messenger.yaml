framework:
    messenger:
        failure_transport: failed

        transports:
            # "async" sends messages to RabbitMQ via AMQP.
            # The worker container consumes from this queue and processes them in the background.
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                options:
                    exchange:
                        name: messages
                    queues:
                        messages: ~
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2

            # Failed messages (after max retries) land here for manual inspection.
            failed: 'doctrine://default?queue_name=failed'

        routing:
            # All three notification messages go to the async (RabbitMQ) transport.
            # The HTTP response returns immediately — the worker picks them up in the background.
            App\Message\UserAssignedMessage:  async
            App\Message\PlanModifiedMessage:  async
            App\Message\PlanDeletedMessage:   async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'

