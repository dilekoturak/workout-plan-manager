services:

  # ─────────────────────────────────────────────
  # PHP-FPM application (Symfony backend)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev          # Switch to "prod" for production builds
    container_name: workout_app
    restart: unless-stopped
    volumes:
      - ./backend:/app     # Live code reload in development
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
    depends_on:
      database:
        condition: service_healthy
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy in front of PHP-FPM
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workout_nginx
    restart: unless-stopped
    ports:
      - "8080:80"          # Access the API at http://localhost:8080
    volumes:
      - ./backend:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # PostgreSQL 16 database
  # ─────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: workout_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"        # Expose locally so you can connect via DBeaver / DataGrip
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workout_network

volumes:
  db_data:

networks:
  workout_network:
    driver: bridge
