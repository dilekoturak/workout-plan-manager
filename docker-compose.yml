services:

  # ─────────────────────────────────────────────
  # PHP-FPM application (Symfony backend)
  # ─────────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: workout_app
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_vendor:/app/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      MAILER_DSN: ${MAILER_DSN}
    depends_on:
      database:
        condition: service_healthy
      database_test:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # Symfony Messenger worker
  # Consumes messages from RabbitMQ and sends emails.
  # Runs as a separate long-lived process — keeps the HTTP app fast.
  # ─────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: dev
    container_name: workout_worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - backend_vendor:/app/vendor
    environment:
      APP_ENV: dev
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}?serverVersion=16&charset=utf8
      MESSENGER_TRANSPORT_DSN: ${MESSENGER_TRANSPORT_DSN}
      MAILER_DSN: ${MAILER_DSN}
    # This is the only difference from the app container: it runs the messenger consumer, not php-fpm
    command: php bin/console messenger:consume async --time-limit=3600 -vv
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # RabbitMQ message broker
  # ─────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: workout_rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"    # AMQP port (used by the app)
      - "15672:15672"  # Management UI — http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy in front of PHP-FPM
  # ─────────────────────────────────────────────
  # Nginx — single entry point: /api/* → PHP-FPM, /* → frontend
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: workout_nginx
    restart: unless-stopped
    ports:
      - "8080:80"          # Single entry point: http://localhost:8080
    volumes:
      - ./backend:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - frontend
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # Vue 3 frontend (built with Vite, served by nginx)
  # Not exposed to host — only reachable via the nginx proxy above
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workout_frontend
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # PostgreSQL 16 database
  # ─────────────────────────────────────────────
  database:
    image: postgres:16-alpine
    container_name: workout_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"        # Expose locally so you can connect via DBeaver / DataGrip
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB}", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workout_network

  # ─────────────────────────────────────────────
  # PostgreSQL 16 — test database (isolated from dev data)
  # Same image, separate volume, different port to avoid conflicts.
  # Used exclusively by `make test` — never touched by the running app.
  # ─────────────────────────────────────────────
  database_test:
    image: postgres:16-alpine
    container_name: workout_db_test
    restart: unless-stopped
    environment:
      POSTGRES_DB: workout_plan_manager_test
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"        # Different host port — connect via localhost:5433 if needed
    volumes:
      - db_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "workout_plan_manager_test", "-U", "${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - workout_network

volumes:
  db_data:
  db_test_data:
  backend_vendor:

networks:
  workout_network:
    driver: bridge
